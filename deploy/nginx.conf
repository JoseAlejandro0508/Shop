server {
  listen 80;
  server_name _;
  # Escucha en puerto 80, server_name genérico

  root /usr/share/nginx/html;
  index index.html;
  # Carpeta donde vive el build React

  location / {
    try_files $uri /index.html;
  }
  # Soporta rutas SPA (/home, /catalogo, etc.) redirigiendo a index.html

  location /api/ {
    proxy_pass http://backend:5099/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }
  # Todo /api/* se envía al servicio backend (nombre del servicio en compose)

  location /uploads/ {
    proxy_pass http://backend:5099/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }
  # Sirve imágenes subidas desde backend
}
